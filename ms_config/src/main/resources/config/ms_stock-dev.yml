spring:
  kafka:
    bootstrap-servers: localhost:9094

    # ✅ ADICIONADO: Configuração do consumer
    consumer:
      group-id: stock-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.example.kafka.event,com.example.ms_stock.*"
        # Se precisar de mapeamento de tipos (igual ao ms_order)
        # spring.json.type.mapping: "OrderCreatedEvent:com.example.kafka.event.OrderCreatedEvent"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true

    # ⚠️ OPCIONAL: default-topic (só use se fizer sentido para seu caso)
    # template:
    #   default-topic: estoque.baixo

  application:
    name: ms_stock

  flyway:
    depends-on: entityManagerFactory

  datasource:
    url: jdbc:postgresql://localhost:5432/ms
    username: ms_user
    password: ms123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update  # ⚠️ Em produção: none ou validate
    show-sql: true
    format_sql: true

server:
  port: 8084

security:
  jwt:
    public-key: classpath:keys/publicKey.pem

product:
  service:
    url: http://localhost:8083/api/products

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json